<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            position: relative;
            cursor: url('Cursor.cur'), auto;
            background-color: #000;
        }

        @supports (-webkit-touch-callout: none) {
            body {
                min-height: -webkit-fill-available;
            }
        }

        /* ????? ??? */
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -3;
        }

        .fallback-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -4;
            display: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            text-align: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(15px);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            user-select: none;
        }

        .overlay span {
            background: linear-gradient(45deg, #fff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 20px 40px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: pulse 2s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            }
            50% { 
                transform: scale(1.05);
                box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
            }
        }

        .overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10001;
            text-align: center;
            display: none;
            color: white;
            max-width: min(95vw, 400px);
            width: 100%;
            padding: 15px;
            pointer-events: auto;
            transform-style: preserve-3d;
            transition: transform 0.01s ease-out;
            will-change: transform;
        }

        .content.show {
            pointer-events: auto;
        }

        /* ?????????? ????? ? ???????? ?????? */
        .profile-container {
            text-align: center;
            color: white;
            padding: clamp(20px, 3vw, 30px);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            margin: 0 auto;
            z-index: 10001;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }

        .stats-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-id-badge {
            display: inline-block;
            padding: 6px 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            margin: 10px 0;
            color: rgba(255, 255, 255, 0.9);
        }

        .status-text {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 15px 0;
        }

        .joined-date {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 20px 0;
        }

        .profile-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .footer-username {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 600;
        }

        .profile-button {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .profile-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .avatar-container {
            position: relative;
            display: block;
            width: clamp(80px, 20vw, 100px);
            height: clamp(80px, 20vw, 100px);
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 10px;
            animation: spinAvatar 15s linear infinite;
            border: 3px solid rgba(255, 255, 255, 0.25);
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.15),
                0 0 60px rgba(41, 196, 255, 0.2);
        }

        @keyframes spinAvatar {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .username-wrapper {
            position: relative;
            display: inline-block;
            margin-top: 15px;
        }

        .username {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            text-transform: capitalize;
            font-weight: 700;
            display: inline-block;
            text-align: center;
            background: linear-gradient(45deg, #fff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            cursor: pointer;
            position: relative;
        }

        .username-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0.3));
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle 3s infinite ease-in-out;
            opacity: 0;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes float-particle {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1);
                opacity: 0;
            }
        }

        .uid {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: white;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
        }

        .username-wrapper:hover .uid {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }

        .badges-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .badge {
            position: relative;
            display: inline-block;
            width: clamp(30px, 8vw, 35px);
            height: clamp(30px, 8vw, 35px);
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.1);
            padding: 4px;
            cursor: pointer;
            pointer-events: auto;
        }

        .badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .badge-name {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            color: white;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
        }

        .badge:hover .badge-name {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }

        .badge:hover,
        .badge:active {
            transform: translateY(-8px) scale(1.15);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .profile-description {
            margin: 20px auto;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            line-height: 1.6;
            min-height: 70px;
            padding: 0 10px;
            max-width: 95%;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .line {
            width: 85%;
            height: 2px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0.3),
                transparent);
            margin: 20px auto;
            border-radius: 3px;
        }

        /* ???????????? ?????????? ?????? - ??????????? ??????? */
        .social-icons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(6px, 2vw, 10px);
            margin-top: 15px;
            padding: 0 5px;
            flex-wrap: nowrap;
        }

        .social-icons .icon {
            width: clamp(30px, 8vw, 35px);
            height: clamp(30px, 8vw, 35px);
            background-color: transparent;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-radius: 10px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 30px;
            min-height: 30px;
            flex-shrink: 0;
            pointer-events: auto;
        }

        .social-icons .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: all 0.3s ease;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .social-icons .icon:hover img,
        .social-icons .icon:active img {
            transform: scale(1.2);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }

        .social-icons .icon:hover,
        .social-icons .icon:active {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* ??? ???????????? ?????? (??????) - ??? ????????? */
        .social-icons .icon.decorative .social-name {
            display: none !important;
        }

        /* ??? ???. ????? - ???? ????????? */
        .social-icons .icon:not(.decorative) .social-name {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            color: white;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 20;
        }

        .social-icons .icon:not(.decorative):hover .social-name,
        .social-icons .icon:not(.decorative):active .social-name {
            opacity: 1;
            transform: translateX(-50%) translateY(-5px);
        }

        /* ?????????? ????????? */
        .volume-control {
            position: fixed !important;
            top: 25px !important;
            left: 25px !important;
            z-index: 10002 !important;
            display: flex !important;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 60px;
            height: 60px;
            overflow: hidden;
            visibility: visible !important;
            opacity: 1 !important;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .volume-control:hover {
            width: 250px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
        }

        .volume-icon {
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            user-select: none;
            width: 30px;
            height: 30px;
            text-align: center;
            transition: transform 0.2s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            margin: 0;
            padding: 0;
        }

        .volume-icon:active {
            transform: scale(0.9);
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 0;
            height: 5px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            cursor: pointer;
            transition: width 0.3s ease;
            opacity: 0;
        }

        .volume-control:hover .volume-slider {
            width: 140px;
            opacity: 1;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .volume-slider::-moz-range-thumb {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .volume-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .volume-control {
                top: 15px;
                left: 15px;
                width: 50px;
                height: 50px;
                padding: 12px;
            }

            .volume-control:hover {
                width: 200px;
                padding: 12px 15px;
            }

            .volume-icon {
                font-size: 1.5rem;
            }

            .volume-control:hover .volume-slider {
                width: 100px;
            }
        }

        @media (max-width: 480px) {
            .volume-control {
                width: 45px;
                height: 45px;
                padding: 10px;
            }

            .volume-control:hover {
                width: 180px;
                padding: 10px 12px;
            }

            .volume-icon {
                font-size: 1.3rem;
            }

            .volume-control:hover .volume-slider {
                width: 90px;
            }
        }

        /* ????????? ????????? */
        @media (max-width: 768px) {
            .profile-container {
                padding: 18px;
                margin: 10px;
                background: rgba(255, 255, 255, 0.07);
                backdrop-filter: blur(20px);
            }
            
            .overlay span {
                font-size: clamp(1.5rem, 5vw, 2.5rem);
                padding: 15px 30px;
            }
            
            .social-icons {
                gap: 5px;
                padding: 0 3px;
            }
            
            .social-icons .icon {
                min-width: 36px;
                min-height: 36px;
                padding: 5px;
            }
        }

        @media (max-width: 480px) {
            .profile-container {
                padding: 15px;
                border-radius: 20px;
                backdrop-filter: blur(15px);
            }
            
            .avatar-container {
                width: 100px;
                height: 100px;
            }
            
            .username {
                font-size: 1.8rem;
                margin-top: 10px;
            }
            
            .profile-description {
                font-size: 1rem;
                margin: 15px auto;
                padding: 0 8px;
            }
            
            .uid {
                font-size: 0.8rem;
                padding: 6px 12px;
                top: -25px;
            }
            
            .social-icons {
                gap: 4px;
            }
            
            .social-icons .icon {
                width: 34px;
                height: 34px;
                min-width: 34px;
                min-height: 34px;
                padding: 4px;
            }
            
            .social-icons .icon:not(.decorative) .social-name {
                font-size: 0.7rem;
                padding: 4px 8px;
                top: -35px;
            }
        }

        @media (max-width: 380px) {
            .social-icons {
                gap: 3px;
            }
            
            .social-icons .icon {
                width: 32px;
                height: 32px;
                min-width: 32px;
                min-height: 32px;
                padding: 3px;
            }
            
            .profile-container {
                padding: 12px;
            }
        }

        @media (orientation: landscape) and (max-height: 600px) {
            .profile-container {
                padding: 15px;
                min-height: auto;
                backdrop-filter: blur(20px);
            }
            
            .avatar-container {
                width: 90px;
                height: 90px;
            }
            
            .username {
                font-size: 1.6rem;
                margin-top: 10px;
            }
            
            .social-icons {
                margin-top: 15px;
                gap: 6px;
            }
            
            .social-icons .icon {
                width: 35px;
                height: 35px;
            }
        }

        /* ???????? ????????? */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .content.show {
            display: block;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* ???????? ??? ???????? - ????????????! */
        .snowflake {
            position: fixed;
            top: -50px;
            color: #fff;
            font-size: 1rem;
            animation: fall linear forwards, wobble ease-in-out infinite;
            pointer-events: none;
            user-select: none;
            z-index: 1;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            will-change: transform, top;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                top: -50px;
            }
            100% {
                transform: translateY(calc(100vh + 50px)) rotate(360deg);
                top: 100vh;
            }
        }

        @keyframes wobble {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-10px);
            }
            75% {
                transform: translateX(10px);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        /* Модальное окно предупреждения */
        .warning-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            animation: fadeIn 0.3s ease;
        }

        .warning-modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .warning-content {
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .warning-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ed4245 0%, #c93538 100%);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 30px rgba(237, 66, 69, 0.4);
            animation: pulse 2s infinite;
        }

        .warning-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
        }

        .warning-text {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .warning-tracking {
            background: rgba(237, 66, 69, 0.15);
            border: 1px solid rgba(237, 66, 69, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            color: #ed4245;
            font-size: 1rem;
            font-weight: 600;
        }

        .warning-button {
            background: linear-gradient(135deg, #ed4245 0%, #c93538 100%);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(237, 66, 69, 0.4);
        }

        .warning-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(237, 66, 69, 0.6);
        }

        .warning-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Видео фон активен -->
    <video autoplay loop playsinline class="background-video" id="bg-video">
        <source src="background.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео тег.
    </video>
    <img src="fallback.jpg" alt="Fallback Background" class="fallback-image" id="fallback-image">
    
    <div class="volume-control" id="volume-control">
        <div class="volume-icon" id="volume-icon">&#128266;</div>
        <input type="range" min="0" max="100" value="50" class="volume-slider" id="volume-slider">
    </div>

    <div class="overlay" id="overlay">
        <span>Tap To Enter</span>
    </div>

    <!-- Модальное окно предупреждения -->
    <div class="warning-modal" id="warning-modal">
        <div class="warning-content">
            <div class="warning-icon">!</div>
            <div class="warning-title">Доступ запрещен</div>
            <div class="warning-text">
                Использование инструментов разработчика на этом сайте запрещено.
            </div>
            <div class="warning-text">
                Попытка обхода защиты может привести к блокировке аккаунта.
            </div>
            <div class="warning-tracking">Ваши действия отслеживаются</div>
            <button class="warning-button" onclick="closeWarning()">Понятно</button>
        </div>
    </div>

    <div class="content" id="content">
        <div class="profile-container" id="profile-container">
            <!-- Счетчики сверху -->
            <div class="stats-container">
                <div class="stat-item">
                    <span>&#128065;</span>
                    <span>3333</span>
                </div>
                <div class="stat-item">
                    <span>#</span>
                    <span>1337</span>
                </div>
            </div>

            <div class="avatar-container">
                <img src="avatar.gif" alt="Avatar" class="avatar" loading="lazy">
            </div>

            <div class="username-wrapper">
                <div class="username">
                    Alway
                </div>
                <div class="uid">UID: 0</div>
            </div>

            <div class="badges-container">
                <div class="badge" title="Staff">
                    <img src="staff.png" alt="Staff badge" loading="lazy">
                    <div class="badge-name">Staff</div>
                </div>
                <div class="badge" title="Owner">
                    <img src="owner.png" alt="Owner badge" loading="lazy">
                    <div class="badge-name">Owner</div>
                </div>
                <div class="badge" title="Developer">
                    <img src="dev.png" alt="Developer badge" loading="lazy">
                    <div class="badge-name">Developer</div>
                </div>
            </div>

            <p class="profile-description">
                <span id="typing-text"></span>
            </p>

            <div class="line"></div>

            <!-- Social Icons -->
            <div class="social-icons">
                <div class="icon decorative">
                    <img src="Angle_Wing_Right.png" alt="Wing" loading="lazy">
                </div>
                <div class="icon" onclick="window.open('https://steamcommunity.com/id/korsaki/');" title="Steam">
                    <img src="steam.gif" alt="Steam" loading="lazy">
                    <div class="social-name">Steam</div>
                </div>
                <div class="icon" onclick="window.open('https://discordapp.com/users/1278440640526680087');" title="Discord">
                    <img src="discord.gif" alt="Discord" loading="lazy">
                    <div class="social-name">Discord</div>
                </div>
                <div class="icon" onclick="window.open('https://t.me/votmc');" title="Telegram">
                    <img src="telegram.gif" alt="Telegram" loading="lazy">
                    <div class="social-name">Telegram</div>
                </div>
                <div class="icon decorative">
                    <img src="Angle_Wing_Left.png" alt="Wing" loading="lazy">
                </div>
            </div>
        </div>
    </div>

    <script>
        // Функция показа предупреждения
        function showWarning() {
            document.getElementById('warning-modal').classList.add('show');
        }

        // Функция закрытия предупреждения
        function closeWarning() {
            document.getElementById('warning-modal').classList.remove('show');
        }

        // Защита от копирования
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        document.addEventListener('keydown', function(e) {
            // Блокируем Ctrl+C, Ctrl+U, Ctrl+S
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'C' || e.key === 'U' || e.key === 'S')) {
                e.preventDefault();
                return false;
            }
            // Блокируем F12
            if (e.key === 'F12') {
                e.preventDefault();
                showWarning();
                return false;
            }
            // Блокируем Ctrl+Shift+I/J/C
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                showWarning();
                return false;
            }
            // Блокируем PrintScreen - все возможные варианты
            if (e.key === 'PrintScreen' || e.code === 'PrintScreen' || e.keyCode === 44 || e.which === 44) {
                e.preventDefault();
                e.stopPropagation();
                showWarning();
                navigator.clipboard.writeText('');
                document.body.style.visibility = 'hidden';
                setTimeout(function() {
                    document.body.style.visibility = 'visible';
                }, 200);
                return false;
            }
        });
        
        document.addEventListener('keyup', function(e) {
            // Дополнительная проверка на keyup для PrintScreen
            if (e.key === 'PrintScreen' || e.code === 'PrintScreen' || e.keyCode === 44 || e.which === 44) {
                e.preventDefault();
                e.stopPropagation();
                showWarning();
                navigator.clipboard.writeText('');
                return false;
            }
        });
        
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
        });
        
        // Защита от скриншотов - скрываем контент при потере фокуса
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.body.style.opacity = '0';
            } else {
                document.body.style.opacity = '1';
            }
        });
        
        window.addEventListener('blur', function() {
            document.body.style.opacity = '0';
        });
        
        window.addEventListener('focus', function() {
            document.body.style.opacity = '1';
        });

        // ?????????, ??????????? ?? ?????
        const videoElement = document.getElementById('bg-video');
        const fallbackImage = document.getElementById('fallback-image');
        
        videoElement.addEventListener('error', function() {
            console.log('Video failed to load, showing fallback image');
            fallbackImage.style.display = 'block';
        });
        
        videoElement.addEventListener('loadeddata', function() {
            console.log('Video loaded successfully');
            fallbackImage.style.display = 'none';
        });

        // ????????? ????? ?? ???????
        const overlay = document.getElementById('overlay');
        const content = document.getElementById('content');
        
        function enterSite() {
            console.log('enterSite called');
            overlay.classList.add('hidden');
            overlay.style.display = 'none';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '-1';
            content.classList.add('show');
            console.log('Classes added');
            
            // Попытка воспроизведения музыки с обработкой ошибок
            const music = document.querySelector('#bg-video');
            const playPromise = music.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Autoplay prevented: ", error);
                });
            }
            
            // ????????? ???????? ????? ?????
            startAnimations();
            console.log('Animations started');
        }

        overlay.addEventListener('click', enterSite);
        overlay.addEventListener('touchend', enterSite);
        
        // ????????? ?????????? ??? ???????????
        overlay.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                enterSite();
            }
        });
        
        overlay.tabIndex = 0;

        // ?????????? ????? ? ???????????? ?????????
        const volumeIcon = document.getElementById('volume-icon');
        const volumeSlider = document.getElementById('volume-slider');
        const music = document.getElementById('bg-video');
        
        // ????????????? ????????? ?????????
        music.volume = 0.5;
        
        // Обновление иконки в зависимости от громкости
        function updateVolumeIcon(volume) {
            if (volume === 0) {
                volumeIcon.innerHTML = '&#128263;'; // 🔇
            } else if (volume < 0.5) {
                volumeIcon.innerHTML = '&#128265;'; // 🔉
            } else {
                volumeIcon.innerHTML = '&#128266;'; // 🔊
            }
        }
        
        // Изменение громкости через слайдер
        volumeSlider.addEventListener('input', function() {
            const volume = this.value / 100;
            music.volume = volume;
            updateVolumeIcon(volume);
            
            // Автоматически включаем музыку при изменении громкости
            if (music.paused && volume > 0) {
                const playPromise = music.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Playback failed: ", error);
                    });
                }
            }
        });
        
        // Клик по иконке - mute/unmute
        volumeIcon.addEventListener('click', function() {
            if (music.volume > 0) {
                music.dataset.previousVolume = music.volume;
                music.volume = 0;
                volumeSlider.value = 0;
                updateVolumeIcon(0);
            } else {
                const previousVolume = music.dataset.previousVolume || 0.5;
                music.volume = previousVolume;
                volumeSlider.value = previousVolume * 100;
                updateVolumeIcon(previousVolume);
                const playPromise = music.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Playback failed: ", error);
                    });
                }
            }
        });

        // ???????????? ?????
        const phrases = [
            "Always come back",
            "A journey hundreds miles begins with a single step",
        ];
        const typingTextElement = document.getElementById('typing-text');
        let currentPhraseIndex = 0;
        let currentCharIndex = 0;
        let isDeleting = false;
        let typingSpeed = 100;
        let deletingSpeed = 50;

        function type() {
            const currentPhrase = phrases[currentPhraseIndex];
            const delay = isDeleting ? deletingSpeed : typingSpeed;

            if (!isDeleting && currentCharIndex < currentPhrase.length) {
                typingTextElement.textContent += currentPhrase[currentCharIndex];
                currentCharIndex++;
            } else if (isDeleting && currentCharIndex > 0) {
                typingTextElement.textContent = currentPhrase.slice(0, currentCharIndex - 1);
                currentCharIndex--;
            } else if (!isDeleting && currentCharIndex === currentPhrase.length) {
                isDeleting = true;
                setTimeout(type, 1000);
                return;
            } else if (isDeleting && currentCharIndex === 0) {
                isDeleting = false;
                currentPhraseIndex = (currentPhraseIndex + 1) % phrases.length;
                typingSpeed = Math.random() * 50 + 80;
                deletingSpeed = Math.random() * 30 + 40;
            }

            setTimeout(type, delay);
        }

        // 3D ?????? ??? ???????
        const profileContainer = document.getElementById('profile-container');
        const isTouchDevice = 'ontouchstart' in window;
        
        if (!isTouchDevice) {
            content.addEventListener('mousemove', function (e) {
                const rect = this.getBoundingClientRect();
                const sensitivity = 35;
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const rotateX = ((y / rect.height) - 0.5) * sensitivity;
                const rotateY = ((x / rect.width) - 0.5) * -sensitivity;

                this.style.transform = `
                    perspective(1000px)
                    rotateX(${rotateX}deg)
                    rotateY(${rotateY}deg)
                `;
            });

            content.addEventListener('mouseleave', function () {
                this.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
            });
        }

        // ??????? ??? ???????? ???????? - ????????? ??????????!
        let snowflakeInterval = null;
        let snowflakes = [];
        
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.className = 'snowflake';
            
            // Разные символы снежинок
            const symbols = ['&#10052;', '&#10022;', '&#10053;', '*', '&#183;'];
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            snowflake.innerHTML = symbol;
            
            // ????????? ??????? ?? ???????????
            const leftPosition = Math.random() * 100;
            snowflake.style.left = `${leftPosition}vw`;
            
            // ?????? ???????? ???????
            const duration = Math.random() * 5 + 8; // 8-13 ??????
            snowflake.style.animationDuration = `${duration}s`;
            
            // ?????? ??????
            const size = Math.random() * 15 + 12; // 12-27px
            snowflake.style.fontSize = `${size}px`;
            
            // ?????? ????????????
            const opacity = Math.random() * 0.5 + 0.4; // 0.4-0.9
            snowflake.style.opacity = opacity;
            
            // ?????? ????????????? ?????????
            const wobbleSpeed = Math.random() * 3 + 2; // 2-5 ??????
            snowflake.style.animation = `fall ${duration}s linear forwards, wobble ${wobbleSpeed}s ease-in-out infinite`;
            
            // ????????? ?????????????? ???????? ??? ????????? ????????
            if (Math.random() > 0.7) {
                snowflake.style.animation += `, float ${Math.random() * 2 + 1.5}s ease-in-out infinite`;
            }
            
            
            const hue = Math.random() > 0.7 ? 190 + Math.random() * 40 : 0;
            const saturation = Math.random() > 0.7 ? 70 + Math.random() * 30 : 0;
            const lightness = 85 + Math.random() * 15;
            snowflake.style.color = `hsla(${hue}, ${saturation}%, ${lightness}%, ${opacity})`;
            
            // ????????? ?? ????????
            document.body.appendChild(snowflake);
            snowflakes.push(snowflake);
            
            setTimeout(() => {
                if (snowflake.parentNode) {
                    snowflake.remove();
                    const index = snowflakes.indexOf(snowflake);
                    if (index > -1) {
                        snowflakes.splice(index, 1);
                    }
                }
            }, duration * 1000);
            
            return snowflake;
        }

        function startSnowflakes() {
            // ??????? ?????????? ???????? ???? ????
            if (snowflakeInterval) {
                clearInterval(snowflakeInterval);
            }
            
            // ??????? ??? ???????????? ????????
            snowflakes.forEach(snowflake => {
                if (snowflake.parentNode) {
                    snowflake.remove();
                }
            });
            snowflakes = [];
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => createSnowflake(), i * 150);
            }
            
            // ?????????? ????????? ????????
            snowflakeInterval = setInterval(createSnowflake, 300);
        }

        // ????????? ????????
        function stopSnowflakes() {
            if (snowflakeInterval) {
                clearInterval(snowflakeInterval);
                snowflakeInterval = null;
            }
            
            // ??????? ??? ????????
            snowflakes.forEach(snowflake => {
                if (snowflake.parentNode) {
                    snowflake.remove();
                }
            });
            snowflakes = [];
        }

        // Touch ??????????? ??? ?????????
        document.addEventListener('DOMContentLoaded', function() {
            if (isTouchDevice) {
                document.body.style.cursor = 'default';
                
                // ???????? touch-???????
                document.querySelectorAll('.icon').forEach(element => {
                    element.style.touchAction = 'manipulation';
                    element.style.cursor = 'pointer';
                });
            }

            // ?????????????? ??????????????? ??? ??????? ????
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);

            // ????????????? ??????????? ?????? ??? ?????????
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
            
            window.addEventListener('resize', () => {
                document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
            });
        });

        // ?????? ???? ????????
        function startAnimations() {
            // ????????? ?????? ??????
            setTimeout(type, 500);
            
            // ????????? ???????? - ?????? ????????!
            startSnowflakes();
            
            // Запускаем частицы вокруг ника
            startUsernameParticles();
        }

        // Функция для создания частиц вокруг никнейма
        function startUsernameParticles() {
            const usernameWrapper = document.querySelector('.username-wrapper');
            
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'username-particle';
                
                // Случайная позиция вокруг ника
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.animationDelay = `${Math.random() * 3}s`;
                
                usernameWrapper.appendChild(particle);
                
                // Удаляем частицу после анимации
                setTimeout(() => {
                    particle.remove();
                }, 3000);
            }
            
            // Создаем частицы каждые 200мс
            setInterval(createParticle, 200);
        }
    </script>
</body>
</html>
